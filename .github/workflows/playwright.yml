name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "*/15 * * * *"
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test

      - name: Check allure-results directory
        if: ${{ !cancelled() }}
        run: |
          if [ -d "allure-results" ]; then
            echo "✓ allure-results directory exists"
            ls -la allure-results/
          else
            echo "✗ allure-results directory not found!"
            exit 1
          fi

      - name: Install Allure Command Line
        if: ${{ !cancelled() }}
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: ${{ !cancelled() }}
        run: |
          allure --version
          allure generate allure-results -o allure-report --clean
          echo "✓ Allure report generated successfully"

      - name: Verify Allure Report
        if: ${{ !cancelled() }}
        run: |
          if [ -d "allure-report" ]; then
            echo "✓ allure-report directory created"
            ls -la allure-report/
          else
            echo "✗ Report generation failed"
            exit 1
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
