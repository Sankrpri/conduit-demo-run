name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "*/15 * * * *"
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test

      - name: Check allure-results directory
        if: ${{ !cancelled() }}
        run: |
          echo "Checking for allure-results..."
          if [ -d "allure-results" ]; then
            echo "✓ allure-results directory exists"
            find allure-results -type f -name "*.json" | head -20
            echo "Total files: $(find allure-results -type f | wc -l)"
          else
            echo "✗ allure-results directory not found!"
            ls -la
            exit 1
          fi

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure Command Line
        if: ${{ !cancelled() }}
        run: |
          npm install -g allure-commandline
          allure --version

      - name: Generate Allure Report
        if: ${{ !cancelled() }}
        run: |
          echo "Generating Allure report from allure-results..."
          allure generate allure-results --clean -o allure-report 2>&1
          echo "✓ Allure report generated"
          ls -la allure-report/ | head -20

      - name: Verify Allure Report Generated
        if: ${{ !cancelled() }}
        run: |
          if [ -f "allure-report/index.html" ]; then
            echo "✓ index.html exists"
            wc -l allure-report/index.html
          else
            echo "✗ index.html not found!"
            find allure-report -type f | head -20
            exit 1
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
